<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 180" width="1200" height="180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0000"/>
      <stop offset="50%" style="stop-color:#1a0000"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <clipPath id="top-slice"><rect x="0" y="0" width="1200" height="63"/></clipPath>
    <clipPath id="mid-slice"><rect x="0" y="63" width="1200" height="54"/></clipPath>
    <clipPath id="bot-slice"><rect x="0" y="117" width="1200" height="63"/></clipPath>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=Share+Tech+Mono&amp;display=swap');
      .nm { font-family: 'Orbitron', 'Courier New', monospace; font-size: 72px; font-weight: 900; letter-spacing: 10px; text-anchor: middle; dominant-baseline: middle; }
      .sub { font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 16px; letter-spacing: 3px; text-anchor: middle; dominant-baseline: middle; fill: #cccccc; }

      /* === N1 main (white) === */
      .n1 { fill: #ffffff; animation: n1fade 6s infinite; }
      /* === N1 glitch red top === */
      .n1r { fill: #ff3b3b; animation: n1fade 6s infinite, glA 6s infinite; clip-path: url(#top-slice); }
      /* === N1 glitch cyan bot === */
      .n1c { fill: #00eeff; animation: n1fade 6s infinite, glB 6s infinite; clip-path: url(#bot-slice); opacity: 0; }
      /* === N2 main (red) === */
      .n2 { fill: #ff3b3b; animation: n2fade 6s infinite; opacity: 0; }
      /* === N2 glitch white mid === */
      .n2w { fill: #ffffff; animation: n2fade 6s infinite, glC 6s infinite; clip-path: url(#mid-slice); opacity: 0; }
      /* === N2 glitch cyan top === */
      .n2c { fill: #00eeff; animation: n2fade 6s infinite, glD 6s infinite; clip-path: url(#top-slice); opacity: 0; }

      /* noise bars */
      .bar1 { animation: noiseBar1 6s infinite; opacity: 0; }
      .bar2 { animation: noiseBar2 6s infinite; opacity: 0; }

      @keyframes n1fade {
        0%,35%  { opacity:1; transform:translate(0,0); }
        37%     { opacity:1; transform:translate(-4px,0); }
        38%     { opacity:0.8; transform:translate(6px,1px); }
        39%     { opacity:0.7; transform:translate(-5px,-1px); }
        40%     { opacity:0.5; transform:translate(7px,0); }
        41%     { opacity:0.3; transform:translate(-3px,2px); }
        43%     { opacity:0.1; transform:translate(4px,-1px); }
        45%,85% { opacity:0; transform:translate(0,0); }
        87%     { opacity:0; transform:translate(-5px,0); }
        88%     { opacity:0.2; transform:translate(6px,1px); }
        89%     { opacity:0.5; transform:translate(-4px,-1px); }
        90%     { opacity:0.8; transform:translate(3px,0); }
        92%     { opacity:0.95; transform:translate(-1px,0); }
        94%,100%{ opacity:1; transform:translate(0,0); }
      }
      @keyframes n2fade {
        0%,43%  { opacity:0; transform:translate(0,0); }
        44%     { opacity:0.3; transform:translate(7px,-1px); }
        45%     { opacity:0.6; transform:translate(-5px,1px); }
        46%     { opacity:0.8; transform:translate(4px,0); }
        48%     { opacity:0.9; transform:translate(-2px,1px); }
        50%,83% { opacity:1; transform:translate(0,0); }
        85%     { opacity:1; transform:translate(-5px,0); }
        86%     { opacity:0.7; transform:translate(6px,-1px); }
        87%     { opacity:0.4; transform:translate(-4px,1px); }
        88%     { opacity:0.2; transform:translate(3px,0); }
        90%,100%{ opacity:0; transform:translate(0,0); }
      }
      @keyframes glA {
        0%,36%  { opacity:0; transform:translate(0,0); }
        37%     { opacity:0.9; transform:translate(10px,0); }
        38%     { opacity:0.7; transform:translate(-8px,0); }
        39%     { opacity:0.5; transform:translate(12px,0); }
        40%     { opacity:0.3; transform:translate(-5px,0); }
        41%,85% { opacity:0; transform:translate(0,0); }
        87%     { opacity:0.8; transform:translate(-10px,0); }
        88%     { opacity:0.5; transform:translate(7px,0); }
        89%     { opacity:0.2; transform:translate(-4px,0); }
        90%,100%{ opacity:0; transform:translate(0,0); }
      }
      @keyframes glB {
        0%,37%  { opacity:0; transform:translate(0,0); }
        38%     { opacity:0.8; transform:translate(-12px,0); }
        39%     { opacity:0.6; transform:translate(9px,0); }
        40%     { opacity:0.35; transform:translate(-6px,0); }
        42%,86% { opacity:0; transform:translate(0,0); }
        88%     { opacity:0.7; transform:translate(11px,0); }
        89%     { opacity:0.4; transform:translate(-7px,0); }
        91%,100%{ opacity:0; transform:translate(0,0); }
      }
      @keyframes glC {
        0%,43%  { opacity:0; transform:translate(0,0); }
        44%     { opacity:0.8; transform:translate(-11px,0); }
        45%     { opacity:0.6; transform:translate(8px,0); }
        46%     { opacity:0.3; transform:translate(-5px,0); }
        48%,83% { opacity:0; transform:translate(0,0); }
        84%     { opacity:0.9; transform:translate(9px,0); }
        85%     { opacity:0.5; transform:translate(-7px,0); }
        87%,100%{ opacity:0; transform:translate(0,0); }
      }
      @keyframes glD {
        0%,44%  { opacity:0; transform:translate(0,0); }
        45%     { opacity:0.7; transform:translate(12px,0); }
        46%     { opacity:0.5; transform:translate(-9px,0); }
        47%     { opacity:0.3; transform:translate(6px,0); }
        49%,84% { opacity:0; transform:translate(0,0); }
        85%     { opacity:0.8; transform:translate(-10px,0); }
        86%     { opacity:0.4; transform:translate(7px,0); }
        88%,100%{ opacity:0; transform:translate(0,0); }
      }
      @keyframes noiseBar1 {
        0%,36%  { opacity:0; transform:translateY(0); }
        37%     { opacity:1; transform:translateY(-20px); }
        38%     { opacity:0.8; transform:translateY(30px); }
        39%     { opacity:1; transform:translateY(-10px); }
        40%     { opacity:0.5; transform:translateY(40px); }
        41%,85% { opacity:0; }
        86%     { opacity:1; transform:translateY(25px); }
        87%     { opacity:0.7; transform:translateY(-15px); }
        88%     { opacity:0.4; transform:translateY(10px); }
        89%,100%{ opacity:0; }
      }
      @keyframes noiseBar2 {
        0%,37%  { opacity:0; transform:translateY(0); }
        38%     { opacity:0.9; transform:translateY(35px); }
        39%     { opacity:0.6; transform:translateY(-25px); }
        40%     { opacity:0.8; transform:translateY(15px); }
        42%,86% { opacity:0; }
        87%     { opacity:0.9; transform:translateY(-30px); }
        88%     { opacity:0.5; transform:translateY(20px); }
        90%,100%{ opacity:0; }
      }
    </style>
  </defs>

  <!-- background -->
  <rect width="1200" height="180" fill="url(#bg)"/>

  <!-- subtle red vignette edges -->
  <rect width="1200" height="180" fill="none" stroke="#cc0000" stroke-width="1" opacity="0.4"/>

  <!-- name layers — stacked, all centered at y=82 -->
  <text class="nm n1c" x="600" y="82">L4ZZ3RJ0D</text>
  <text class="nm n1r" x="600" y="82">L4ZZ3RJ0D</text>
  <text class="nm n1"  x="600" y="82">L4ZZ3RJ0D</text>
  <text class="nm n2c" x="600" y="82">SREEDANUSH</text>
  <text class="nm n2w" x="600" y="82">SREEDANUSH</text>
  <text class="nm n2"  x="600" y="82">SREEDANUSH</text>

  <!-- noise bars -->
  <rect class="bar1" x="0" y="75" width="1200" height="3" fill="#ff3b3b" opacity="0.7"/>
  <rect class="bar2" x="200" y="95" width="700" height="2" fill="#00eeff" opacity="0.5"/>

  <!-- subtitle -->
  <text class="sub" x="600" y="148">Sree Danush S  |  Offensive Security Engineer  |  Tool Builder</text>
</svg>
